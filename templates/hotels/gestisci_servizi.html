{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Servizi — {{ hotel.nome }}{% endblock %}

{% block content %}
<h1 class="mb-3">🔧 Servizi: {{ hotel.nome }}</h1>
<a href="{% url 'hotels:miei_hotel' %}" class="btn btn-outline-secondary btn-sm mb-3">← Torna ai miei hotel</a>

<div class="card shadow">
    <div class="card-body">
        <form method="post" novalidate>
            {% csrf_token %}
            {{ form|crispy }}
            <button type="submit" class="btn btn-primary w-100 mt-3">Salva servizi</button>
        </form>
    </div>
</div>
{% endblock %}
