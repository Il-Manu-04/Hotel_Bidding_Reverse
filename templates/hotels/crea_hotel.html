{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Nuovo Hotel — Hotel Bidding{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <h1 class="mb-4">➕ Nuovo Hotel</h1>
        <a href="{% url 'hotels:miei_hotel' %}" class="btn btn-outline-secondary btn-sm mb-3">← Torna ai miei hotel</a>
        <div class="card shadow">
            <div class="card-body">
                <form method="post" enctype="multipart/form-data" novalidate>
                    {% csrf_token %}
                    {{ form|crispy }}
                    <button type="submit" class="btn btn-primary btn-lg w-100 mt-3">Crea Hotel</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
